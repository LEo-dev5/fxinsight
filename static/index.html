<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FXInsight</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #1a1a1a; color: #ffffff; font-family: -apple-system, sans-serif; }
        
        #app { display: flex; flex-direction: column; height: 100vh; }
        
        #topbar { padding: 16px 24px; border-bottom: 1px solid #2a2a2a; display: flex; align-items: center; justify-content: space-between; }
        #topbar h1 { font-size: 16px; font-weight: 600; color: #ffffff; }
        
        #toggle-group { display: flex; border: 1px solid #333; border-radius: 6px; overflow: hidden; }
        .toggle-btn { padding: 6px 16px; font-size: 13px; cursor: pointer; border: none; background: transparent; color: #888; border-right: 1px solid #333; }
        .toggle-btn:last-child { border-right: none; }
        .toggle-btn.active { background: #2a2a2a; color: #ffffff; }
        
        #content { display: flex; flex: 1; overflow: hidden; }
        #heatmap-area { flex: 1; padding: 24px; overflow-y: auto; }
        
        #panel { width: 320px; border-left: 1px solid #2a2a2a; padding: 20px; overflow-y: auto; display: none; }
        #panel.open { display: block; }
        #panel-close { float: right; background: none; border: none; color: #888; font-size: 18px; cursor: pointer; }
        #panel h2 { font-size: 14px; font-weight: 600; margin-bottom: 16px; color: #7eb8f7; }
    </style>
</head>
<body>
    <div id="app">
        <div id="topbar">
            <h1>FXInsight</h1>
            <div id="toggle-group">
                <button class="toggle-btn active" onclick="setMode('monthly', this)">월</button>
                <button class="toggle-btn" onclick="setMode('weekly', this)">주</button>
                <button class="toggle-btn" onclick="setMode('daily', this)">일</button>
            </div>
        </div>
        <div id="content">
            <div id="heatmap-area">
                <div id="heatmap"></div>
            </div>
            <div id="panel">
                <button id="panel-close" onclick="closePanel()">✕</button>
                <h2 id="panel-title"></h2>
                <div id="panel-content"></div>
            </div>
        </div>
    </div>
    <script>
        let currentMode = 'monthly';
        let currentYear = 2024;

        function setMode(mode, btn) {
            document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentMode = mode;
            const area = document.getElementById('heatmap');
            area.style.opacity = '0';
            area.style.transition = 'opacity 0.25s';
            setTimeout(() => {
                renderHeatmap();
                area.style.opacity = '1';
            }, 250);
        }

        function closePanel() {
            document.getElementById('panel').classList.remove('open');
        }

        function renderHeatmap() {
            const heatmap = document.getElementById('heatmap');
            heatmap.innerHTML = '로딩 중...';

            const currencies = ['JPY/USD', 'KRW/USD', 'EUR/USD', '달러인덱스', 'GBP/USD', 'CAD/USD', 'CHF/USD'];
            const period = currentMode === 'daily' ? 'daily' : currentMode === 'weekly' ? 'weekly' : 'monthly';

            const promises = currencies.map(currency =>
                fetch(`/api/volatility?currency_pair=${encodeURIComponent(currency)}&period=${period}&year=${currentYear}`)
                    .then(r => r.json())
                    .then(data => ({ currency, data: data.data }))
            );

            Promise.all(promises).then(results => {
                heatmap.innerHTML = '';
                // 월 헤더 추가
                const months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
                // 헤더 추가
                const header = document.createElement('div');
                header.style.cssText = 'display:flex; align-items:center; gap:3px; margin-bottom:4px;';
                const emptyLabel = document.createElement('div');
                emptyLabel.style.cssText = 'width:90px; flex-shrink:0;';
                header.appendChild(emptyLabel);

                if (currentMode === 'monthly') {
                    const months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
                    months.forEach(m => {
                        const span = document.createElement('div');
                        span.style.cssText = 'width:44px; font-size:10px; color:#555; text-align:center; flex-shrink:0;';
                        span.textContent = m;
                        header.appendChild(span);
                    });
                } else if (currentMode === 'weekly') {
                    for (let i = 1; i <= 52; i += 4) {
                        const span = document.createElement('div');
                        span.style.cssText = 'width:10px; font-size:9px; color:#555; flex-shrink:0; margin-right:30px;';
                        span.textContent = i + 'w';
                        header.appendChild(span);
                    }
                } else {
                    // 일별은 헤더 없음
                }

                heatmap.appendChild(header);
                results.forEach(({ currency, data }) => {
                    const row = buildRow(currency, data);
                    heatmap.appendChild(row);
                });
            });
        }

        renderHeatmap();
        function getColor(value) {
            if (value > 6) return '#E24B4A';
            if (value > 4) return '#F09595';
            if (value > 3) return '#EF9F27';
            if (value > 2) return '#FAC775';
            if (value > 1) return '#97C459';
            return '#C0DD97';
        }

        function buildRow(currency, data) {
            const wrapper = document.createElement('div');
            wrapper.style.cssText = 'display:flex; align-items:flex-start; gap:3px; margin-bottom:8px;';

            const label = document.createElement('div');
            label.style.cssText = 'width:90px; font-size:12px; color:#888; flex-shrink:0; padding-top:2px;';
            label.textContent = currency;
            wrapper.appendChild(label);

            if (currentMode === 'daily') {
                // GitHub 잔디 스타일
                const grid = document.createElement('div');
                grid.style.cssText = 'display:grid; grid-template-rows:repeat(7,10px); grid-auto-flow:column; grid-auto-columns:10px; gap:2px;';
                
                // 첫 날의 요일만큼 빈 칸 추가
                if (data.length > 0) {
                    const firstDay = new Date(data[0].date).getDay();
                    for (let i = 0; i < firstDay; i++) {
                        const empty = document.createElement('div');
                        empty.style.cssText = 'width:10px; height:10px; border-radius:2px;';
                        grid.appendChild(empty);
                    }
                }

                data.forEach(item => {
                    const cell = document.createElement('div');
                    cell.style.cssText = `width:10px; height:10px; border-radius:2px; background:${getColor(item.value)}; cursor:pointer;`;
                    cell.title = `${item.date}: ${item.value.toFixed(2)}%`;
                    cell.addEventListener('click', () => openPanel(currency, item.date, item.value));
                    grid.appendChild(cell);
                });

                wrapper.appendChild(grid);
            } else {
                const cellW = currentMode === 'monthly' ? '44px' : '10px';
                const cellH = currentMode === 'monthly' ? '28px' : '22px';

                data.forEach(item => {
                    const cell = document.createElement('div');
                    cell.style.cssText = `width:${cellW}; height:${cellH}; border-radius:3px; background:${getColor(item.value)}; cursor:pointer; flex-shrink:0;`;
                    cell.title = `${item.date}: ${item.value.toFixed(2)}%`;
                    cell.addEventListener('click', () => openPanel(currency, item.date, item.value));
                    wrapper.appendChild(cell);
                });
            }

            return wrapper;
        }
        function openPanel(currency, date, value) {
            document.getElementById('panel-title').textContent = `${currency} — ${date}`;
            document.getElementById('panel-content').innerHTML = `
                <div style="margin-bottom:16px;">
                    <div style="font-size:11px;color:#888;margin-bottom:4px;">변동성</div>
                    <div style="font-size:24px;font-weight:600;color:${getColor(value)};">${value.toFixed(2)}%</div>
                </div>
                <div style="font-size:11px;color:#888;margin-bottom:8px;">관련 뉴스</div>
                <div id="news-list">로딩 중...</div>
            `;
            document.getElementById('panel').classList.add('open');

            fetch(`/api/news?currency_pair=${encodeURIComponent(currency)}&date=${date}`)
                .then(r => r.json())
                .then(data => {
                    const newsList = document.getElementById('news-list');
                    if (!data.available) {
                        newsList.innerHTML = '<div style="font-size:12px;color:#555;">3개월 이전 뉴스는 제공되지 않아요</div>';
                        return;
                    }
                    if (data.articles.length === 0) {
                        newsList.innerHTML = '<div style="font-size:12px;color:#555;">관련 뉴스가 없어요</div>';
                        return;
                    }
                    newsList.innerHTML = data.articles.map(a => `
                        <div style="margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #2a2a2a;">
                            <a href="${a.url}" target="_blank" style="font-size:12px;color:#7eb8f7;text-decoration:none;line-height:1.4;display:block;">${a.title}</a>
                            <div style="font-size:11px;color:#555;margin-top:4px;">${a.source}</div>
                        </div>
                    `).join('');
                });
            }

    </script>
</body>
</html>
