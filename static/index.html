<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FXInsight</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #1a1a1a; color: #ffffff; font-family: -apple-system, sans-serif; }
        #app { display: flex; flex-direction: column; height: 100vh; }
        #topbar { padding: 16px 24px; border-bottom: 1px solid #2a2a2a; display: flex; align-items: center; justify-content: space-between; }
        #topbar h1 { font-size: 16px; font-weight: 600; }
        #breadcrumb { font-size: 12px; color: #555; margin-left: 16px; display: flex; align-items: center; gap: 6px; }
        .bc-link { color: #7eb8f7; cursor: pointer; }
        .bc-link:hover { text-decoration: underline; }
        #toggle-group { display: flex; border: 1px solid #333; border-radius: 6px; overflow: hidden; }
        .toggle-btn { padding: 6px 16px; font-size: 13px; cursor: pointer; border: none; background: transparent; color: #888; border-right: 1px solid #333; }
        .toggle-btn:last-child { border-right: none; }
        .toggle-btn.active { background: #2a2a2a; color: #ffffff; }
        #back-btn { font-size: 12px; color: #7eb8f7; cursor: pointer; padding: 5px 12px; border: 1px solid #333; border-radius: 6px; background: transparent; display: none; margin-right: 8px; }
        #year-select {
            background: #2a2a2a;
            color: #ffffff;
            border: 1px solid #333;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            margin-right: 8px;
        }
        #content { display: flex; flex: 1; overflow: hidden; }
        #heatmap-area { flex: 1; padding: 24px; overflow-y: auto; }
        #panel { width: 600px; border-left: 1px solid #2a2a2a; padding: 20px; overflow-y: auto; display: none; }
        #panel.open { display: block; }
        #panel-close { float: right; background: none; border: none; color: #888; font-size: 18px; cursor: pointer; }
        #panel h2 { font-size: 14px; font-weight: 600; margin-bottom: 16px; color: #7eb8f7; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
</head>
<body>
    <div id="app">
        <div id="topbar">
            <div style="display:flex; align-items:center;">
                <h1>FXInsight</h1>
                <div id="breadcrumb"><span>연간</span></div>
            </div>
            <div style="display:flex; align-items:center;">
                <select id="year-select" onchange="changeYear(this.value)">
                    <option value="2022">2022</option>
                    <option value="2023">2023</option>
                    <option value="2024">2024</option>
                    <option value="2025">2025</option>
                    <option value="2026" selected>2026</option>
                </select>
                <button id="back-btn" onclick="goBack()">← 연간으로</button>
                <div id="toggle-group">
                    <button class="toggle-btn active" onclick="setMode('monthly', this)">월</button>
                    <button class="toggle-btn" onclick="setMode('weekly', this)">주</button>
                </div>
            </div>
        </div>
        <div id="content">
            <div id="heatmap-area">
                <div id="heatmap"></div>
            </div>
            <div id="panel">
                <button id="panel-close" onclick="closePanel()">✕</button>
                <h2 id="panel-title"></h2>
                <div id="panel-content"></div>
            </div>
        </div>
    </div>
    <script>
        let currentMode = 'monthly';
        let currentYear = parseInt(document.getElementById('year-select').value);
        let isDrillDown = false;
        const currencies = ['JPY/USD', 'KRW/USD', 'EUR/USD', '달러인덱스', 'GBP/USD', 'CAD/USD', 'CHF/USD'];
        const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
        const dayNames = ['일','월','화','수','목','금','토'];

        function getColor(value) {
            if (value > 6) return '#E24B4A';
            if (value > 4) return '#F09595';
            if (value > 3) return '#EF9F27';
            if (value > 2) return '#FAC775';
            if (value > 1) return '#97C459';
            return '#C0DD97';
        }

        function setMode(mode, btn) {
            document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentMode = mode;
            fadeAndRender(() => renderHeatmap());
        }

        function fadeAndRender(fn) {
            const area = document.getElementById('heatmap');
            area.style.opacity = '0';
            area.style.transition = 'opacity 0.25s';
            setTimeout(() => { fn(); area.style.opacity = '1'; }, 250);
        }

        function closePanel() {
            document.getElementById('panel').classList.remove('open');
        }

        function goBack() {
            isDrillDown = false;
            document.getElementById('back-btn').style.display = 'none';
            document.getElementById('breadcrumb').innerHTML = `<span>${currentYear}년 연간</span>`;
            closePanel();
            fadeAndRender(() => renderHeatmap());
        }

        function changeYear(year) {
            currentYear = parseInt(year);
            document.getElementById('breadcrumb').innerHTML = `<span>${currentYear}년 연간</span>`;
            goBack();
        }

        function renderHeatmap() {
            const heatmap = document.getElementById('heatmap');
            heatmap.innerHTML = '로딩 중...';

            const period = currentMode === 'weekly' ? 'weekly' : 'monthly';
            const promises = currencies.map(currency =>
                fetch(`/api/volatility?currency_pair=${encodeURIComponent(currency)}&period=${period}&year=${currentYear}`)
                    .then(r => r.json())
                    .then(data => ({ currency, data: data.data }))
            );

            Promise.all(promises).then(results => {
                heatmap.innerHTML = '';
                const header = document.createElement('div');
                header.style.cssText = 'display:flex; align-items:center; gap:3px; margin-bottom:4px;';
                const emptyLabel = document.createElement('div');
                emptyLabel.style.cssText = 'width:90px; flex-shrink:0;';
                header.appendChild(emptyLabel);

                if (currentMode === 'monthly') {
                    monthNames.forEach(m => {
                        const span = document.createElement('div');
                        span.style.cssText = 'width:56px; font-size:10px; color:#555; text-align:center; flex-shrink:0;';
                        span.textContent = m;
                        header.appendChild(span);
                    });
                } else {
                    for (let i = 1; i <= 52; i += 4) {
                        const span = document.createElement('div');
                        span.style.cssText = 'width:10px; font-size:9px; color:#555; flex-shrink:0; margin-right:30px;';
                        span.textContent = i + 'w';
                        header.appendChild(span);
                    }
                }

                heatmap.appendChild(header);
                results.forEach(({ currency, data }) => {
                    heatmap.appendChild(buildRow(currency, data));
                });

                if (currentMode === 'monthly') {
                    const hint = document.createElement('div');
                    hint.style.cssText = 'font-size:11px; color:#444; margin-top:12px;';
                    hint.textContent = '셀 클릭 → 그 달 일별 히트맵으로 이동';
                    heatmap.appendChild(hint);
                }
            });
        }

        function buildRow(currency, data) {
            const wrapper = document.createElement('div');
            wrapper.style.cssText = 'display:flex; align-items:center; gap:3px; margin-bottom:6px;';
            const label = document.createElement('div');
            label.style.cssText = 'width:90px; font-size:12px; color:#888; flex-shrink:0;';
            label.textContent = currency;
            wrapper.appendChild(label);

            const cellW = currentMode === 'monthly' ? '56px' : '12px';
            const cellH = currentMode === 'monthly' ? '36px' : '26px';

            data.forEach((item, i) => {
                const cell = document.createElement('div');
                cell.style.cssText = `width:${cellW}; height:${cellH}; border-radius:3px; background:${getColor(item.value)}; cursor:pointer; flex-shrink:0;`;
                cell.title = `${item.date}: ${item.value.toFixed(2)}%`;
                if (currentMode === 'monthly') {
                    cell.addEventListener('click', () => drillDown(currency, i + 1, monthNames[i]));
                } else {
                    cell.addEventListener('click', () => openPanel(currency, item.date, item.value));
                }
                wrapper.appendChild(cell);
            });
            return wrapper;
        }

        function drillDown(currency, month, monthName) {
            isDrillDown = true;
            document.getElementById('back-btn').style.display = 'block';
            document.getElementById('breadcrumb').innerHTML = `
                <span class="bc-link" onclick="goBack()">${currentYear}년 연간</span>
                <span style="color:#444"> › </span>
                <span style="color:#fff">${currency} ${monthName}</span>
            `;
            closePanel();
            fadeAndRender(() => renderDaily(currency, month, monthName));
        }

        function renderDaily(currency, month, monthName) {
            const heatmap = document.getElementById('heatmap');
            heatmap.innerHTML = '';

            const title = document.createElement('div');
            title.style.cssText = 'font-size:13px; font-weight:600; color:#7eb8f7; margin-bottom:16px;';
            title.textContent = `${currency} — ${currentYear}년 ${monthName} 일별 변동성`;
            heatmap.appendChild(title);

            const daysInMonth = new Date(currentYear, month, 0).getDate();
            const firstDay = new Date(currentYear, month - 1, 1).getDay();

            const header = document.createElement('div');
            header.style.cssText = 'display:flex; align-items:center; gap:3px; margin-bottom:4px;';
            const emptyLabel = document.createElement('div');
            emptyLabel.style.cssText = 'width:90px; flex-shrink:0;';
            header.appendChild(emptyLabel);
            dayNames.forEach(d => {
                const s = document.createElement('div');
                s.style.cssText = 'width:48px; font-size:10px; color:#555; text-align:center; flex-shrink:0;';
                s.textContent = d;
                header.appendChild(s);
            });
            heatmap.appendChild(header);

            fetch(`/api/volatility?currency_pair=${encodeURIComponent(currency)}&period=daily&year=${currentYear}`)
                .then(r => r.json())
                .then(result => {
                    const dailyMap = {};
                    result.data.forEach(d => { dailyMap[d.date] = d.value; });

                    for (let w = 0; w < 6; w++) {
                        const row = document.createElement('div');
                        row.style.cssText = 'display:flex; align-items:center; gap:3px; margin-bottom:4px;';
                        const lbl = document.createElement('div');
                        lbl.style.cssText = 'width:90px; font-size:11px; color:#555; flex-shrink:0;';
                        lbl.textContent = `${w + 1}주차`;
                        row.appendChild(lbl);

                        for (let d = 0; d < 7; d++) {
                            const dayNum = w * 7 + d - firstDay + 1;
                            const cell = document.createElement('div');
                            cell.style.cssText = 'width:48px; height:48px; border-radius:4px; flex-shrink:0; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:2px;';

                            if (dayNum < 1 || dayNum > daysInMonth) {
                                cell.style.background = 'transparent';
                            } else {
                                const dateStr = `${currentYear}-${String(month).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
                                const isWeekend = d === 0 || d === 6;
                                const value = dailyMap[dateStr];

                                if (isWeekend || !value) {
                                    cell.style.background = '#2a2a2a';
                                } else {
                                    cell.style.background = getColor(value);
                                    cell.style.cursor = 'pointer';
                                    cell.addEventListener('click', () => openPanel(currency, dateStr, value));
                                }
                                const dn = document.createElement('div');
                                dn.style.cssText = 'font-size:11px; color:rgba(0,0,0,0.5);';
                                dn.textContent = dayNum;
                                cell.appendChild(dn);
                            }
                            row.appendChild(cell);
                        }
                        heatmap.appendChild(row);
                    }
                });
        }

        function openPanel(currency, date, value) {
            document.getElementById('panel-title').textContent = `${currency} — ${date}`;
            document.getElementById('panel-content').innerHTML = `
                <div style="margin-bottom:16px;">
                    <div style="font-size:11px;color:#888;margin-bottom:4px;">변동성</div>
                    <div style="font-size:24px;font-weight:600;color:${getColor(value)};">${value.toFixed(2)}%</div>
                </div>
                <div style="margin-bottom:16px;">
                    <div style="font-size:11px;color:#888;margin-bottom:8px;">환율 추이</div>
                    <canvas id="rate-chart" height="120"></canvas>
                </div>
                <div style="font-size:11px;color:#888;margin-bottom:8px;">관련 뉴스</div>
                <div id="news-list">로딩 중...</div>
            `;
            document.getElementById('panel').classList.add('open');

            // 날짜 범위 계산
            const dateObj = new Date(date);
            const year = dateObj.getFullYear();
            const month = dateObj.getMonth();
            const startDate = new Date(year, month, 1).toISOString().slice(0, 10);
            const endDate = new Date(year, month + 1, 0).toISOString().slice(0, 10);

            // 환율 그래프
            fetch(`/api/rates?currency_pair=${encodeURIComponent(currency)}&start_date=${startDate}&end_date=${endDate}`)
                .then(r => r.json())
                .then(rateData => {
                    const labels = rateData.data.map(d => d.date.slice(5));
                    const values = rateData.data.map(d => d.rate);
                    const ctx = document.getElementById('rate-chart').getContext('2d');
                    new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels,
                            datasets: [{
                                data: values,
                                borderColor: '#7eb8f7',
                                backgroundColor: 'rgba(126,184,247,0.1)',
                                borderWidth: 1.5,
                                pointRadius: 0,
                                fill: true,
                                tension: 0.3
                            }]
                        },
                        options: {
                            plugins: { legend: { display: false } },
                            scales: {
                                x: { ticks: { color: '#555', font: { size: 10 } }, grid: { color: '#2a2a2a' } },
                                y: { ticks: { color: '#555', font: { size: 10 } }, grid: { color: '#2a2a2a' } }
                            }
                        }
                    });
                });

            // 뉴스
            fetch(`/api/news?currency_pair=${encodeURIComponent(currency)}&date=${date}`)
                .then(r => r.json())
                .then(data => {
                    const newsList = document.getElementById('news-list');
                    if (!data.available) {
                        newsList.innerHTML = '<div style="font-size:12px;color:#555;">3개월 이전 뉴스는 제공되지 않아요</div>';
                        return;
                    }
                    if (data.articles.length === 0) {
                        newsList.innerHTML = '<div style="font-size:12px;color:#555;">관련 뉴스가 없어요</div>';
                        return;
                    }
                    newsList.innerHTML = data.articles.map(a => `
                        <div style="margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #2a2a2a;">
                            <a href="${a.url}" target="_blank" style="font-size:12px;color:#7eb8f7;text-decoration:none;line-height:1.4;display:block;">${a.title}</a>
                            <div style="font-size:11px;color:#555;margin-top:4px;">${a.source}</div>
                        </div>
                    `).join('');
                });
        }

        renderHeatmap();
    </script>
</body>
</html>
